apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cert-manager-linode-dns
rules:
- apiGroups: ["acme.slicen.me"]
  resources: ["linode"]
  verbs: ["get", "list", "watch", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cert-manager-linode-dns
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cert-manager-linode-dns
subjects:
- kind: ServiceAccount
  name: cert-manager
  namespace: cert-manager
